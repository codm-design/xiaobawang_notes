  *{margin:0;padding:0;box-sizing:border-box}
  :root{--purple:#7C3AED;--purple-dark:#5B21B6;--purple-bg:#F5F3FF;--purple-bg2:#EDE9FE;--dark:#1F2937;--gray:#6B7280;--gray-light:#9CA3AF;--green:#059669;--red:#DC2626;--white:#FFF;--bg:#FAFAFA;--card-shadow:0 1px 3px rgba(0,0,0,.06);--card-hover:0 10px 25px rgba(124,58,237,.12)}

  .hero h1{font-size:2.6rem;font-weight:900;letter-spacing:-1px;position:relative;z-index:1}
  .hero .sub{font-size:.95rem;opacity:.8;margin-top:10px;font-weight:300;position:relative;z-index:1}
  .hero .stats{display:flex;justify-content:center;gap:36px;margin-top:24px;position:relative;z-index:1;flex-wrap:wrap}
  .hero .stat{text-align:center}.hero .stat .n{font-size:1.8rem;font-weight:800}.hero .stat .l{font-size:.7rem;opacity:.7;text-transform:uppercase;letter-spacing:1px}

  .big-tab.active{color:var(--purple);border-bottom-color:var(--purple);background:var(--purple-bg)}
  .big-tab .icon{font-size:1.3rem;display:block;margin-bottom:4px}
  .big-tab .count{font-size:.7rem;color:var(--gray-light);font-weight:500}

  /* SUB TABS */

  /* SEARCH */
  .search-bar{max-width:1200px;margin:16px auto;padding:0 20px}

  .vocab-card .en{font-size:1.15rem;font-weight:800}

// TTS PRONUNCIATION (Web Speech API)
// ============================================================
function speak(text, accent) {
  if (!window.speechSynthesis) return alert("Your browser doesn't support speech synthesis.");
  window.speechSynthesis.cancel();
  const u = new SpeechSynthesisUtterance(text.replace(/\/.+?\//g,"").replace(/[^a-zA-Z\s'-]/g,"").trim());
  u.rate = 0.85; u.pitch = 1;
  const voices = window.speechSynthesis.getVoices();
  const lang = accent === "uk" ? "en-GB" : "en-US";
  const voice = voices.find(v => v.lang === lang) || voices.find(v => v.lang.startsWith("en"));
  if (voice) u.voice = voice;
  u.lang = lang;
  window.speechSynthesis.speak(u);
}
// Preload voices
if (window.speechSynthesis) {
  speechSynthesis.getVoices();
  speechSynthesis.onvoiceschanged = () => speechSynthesis.getVoices();
}

  if(w.past)p.push(`<span class="form-item past"><span class="fl">Past</span>${w.past}</span>`);
  if(w.pp&&w.pp!==w.past)p.push(`<span class="form-item pp"><span class="fl">P.P.</span>${w.pp}</span>`);
  if(w.ing)p.push(`<span class="form-item ing"><span class="fl">-ing</span>${w.ing}</span>`);
  if(w.future)p.push(`<span class="form-item future"><span class="fl">Will</span>${w.future}</span>`);
  if(w.plural)p.push(`<span class="form-item plural"><span class="fl">Pl.</span>${w.plural}</span>`);
  return p.length?`<div class="forms">${p.join("")}</div>`:"";
}
function tagH(t){
  const m={verb:"动词",adj:"形容词",adv:"副词",prep:"介词",phrase:"短语"};
  const bg={verb:"#D1FAE5",adj:"#FEF3C7",adv:"#FCE7F3",prep:"#E0E7FF",phrase:"#EDE9FE"};
  const fg={verb:"#065F46",adj:"#92400E",adv:"#9D174D",prep:"#3730A3",phrase:"#5B21B6"};
  return t?`<span style="display:inline-block;font-size:.65rem;padding:1px 6px;border-radius:4px;font-weight:700;background:${bg[t]||'#F3F4F6'};color:${fg[t]||'#4B5563'};margin-right:3px">${m[t]||t}</span>`:"";
}
function dictUrl(w){return `https://dict.eudic.net/dicts/en/${encodeURIComponent(w.split("/")[0].trim())}`}

function vocabCard(w){
  const word = w.en.split("/")[0].trim();
  const ph = (w.uk||w.us) ? `<div class="pron-row">
    ${w.uk?`<button class="pron-btn uk" onclick="speak('${word}','uk')"><span class="speaker">🔊</span>UK</button><span class="phonetic-text">${w.uk}</span>`:``}
    ${w.us?`<button class="pron-btn us" onclick="speak('${word}','us')"><span class="speaker">🔊</span>US</button><span class="phonetic-text">${w.us}</span>`:``}
  </div>` : "";
  const df = w.defs?`<div class="defs">${w.defs.map(d=>`<div class="def-line">${d}</div>`).join("")}</div>`:"";
  const dt = w.date?`<div style="font-size:.62rem;color:#C4B5FD;margin-top:6px">📅 ${w.date}</div>`:"";
  const ss = `${w.en} ${w.zh} ${(w.defs||[]).join(" ")} ${(w.exam||[]).join(" ")} ${w.uk||""} ${w.us||""} ${w.past||""} ${w.plural||""} ${w.date||""}`;
  return `<div class="vocab-card" data-search="${ss.replace(/"/g,"'")}" data-sub="${w.sub||w.cat}">
    <div class="card-top"><div class="en">${w.en}</div><a class="dict-link" href="${dictUrl(w.en)}" target="_blank">🔍 词典</a></div>
    ${ph}${df}${tagH(w.tag)}${examH(w.exam)}${w.note?`<div class="note">${w.note}</div>`:""}${formsH(w)}${dt}
  </div>`;
}

// ========== IRIS 英语笔记 ==========
function buildIris(){
  const cats = [...new Set(ALL_VOCAB.map(v=>v.cat))];
  const tabsEl = document.getElementById("irisSubTabs");
  const contentEl = document.getElementById("irisContent");

  // Add phrase & source tabs
  const allTabs = [...cats, "常用短语", "扫描来源"];
  tabsEl.innerHTML = allTabs.map((c,i) => {
    const cnt = c==="常用短语"?PHRASES.length:c==="扫描来源"?SOURCES.length:ALL_VOCAB.filter(v=>v.cat===c).length;
    return `<div class="sub-tab ${i===0?'active':''}" data-subtab="iris-${i}">${c} <span class="badge">${cnt}</span></div>`;
  }).join("");

  let html = "";
  cats.forEach((c,i) => {
    const words = ALL_VOCAB.filter(v=>v.cat===c);
    html += `<div class="sub-section ${i===0?'active':''}" id="iris-${i}">
      <div class="section-header"><h2>${c}</h2></div>
      <div class="vocab-grid">${words.map(vocabCard).join("")}</div>
    </div>`;
  });

  // Phrases section
  html += `<div class="sub-section" id="iris-${cats.length}">
    <div class="section-header"><h2>常用短语 & 表达</h2></div>
    <table class="phrase-table"><thead><tr><th>Phrase</th><th>中文含义</th><th>Example</th><th>分类</th></tr></thead>
    <tbody>${PHRASES.map(p=>`<tr data-search="${p.p} ${p.zh} ${p.ex}"><td>${p.p}</td><td>${p.zh}</td><td>${p.ex}</td><td>${p.cat}</td></tr>`).join("")}</tbody></table>
  </div>`;

  // Source section
  html += `<div class="sub-section" id="iris-${cats.length+1}">
    <div class="section-header"><h2>扫描件来源</h2></div>
    <div class="source-grid">${SOURCES.map(s=>`<div class="source-card"><div class="fi ${s.ink}">📄</div><div><div class="fn">${s.name}</div><div class="fd">${s.desc}</div><span class="ink ${s.ink}">${s.l}</span></div></div>`).join("")}</div>
  </div>`;

  contentEl.innerHTML = html;
  bindSubTabs(tabsEl, "iris");
}

// ========== TAB BINDING ==========
function bindSubTabs(container, prefix){
  container.querySelectorAll(".sub-tab").forEach(tab => {
    tab.addEventListener("click", () => {
      container.querySelectorAll(".sub-tab").forEach(t=>t.classList.remove("active"));
      const parent = container.nextElementSibling;
      parent.querySelectorAll(".sub-section").forEach(s=>s.classList.remove("active"));
      tab.classList.add("active");
      document.getElementById(tab.dataset.subtab).classList.add("active");
    });
  });
}

// BIG TABS
document.querySelectorAll(".big-tab").forEach(tab => {
  tab.addEventListener("click", () => {
    document.querySelectorAll(".big-tab").forEach(t=>t.classList.remove("active"));
    document.querySelectorAll(".big-section").forEach(s=>s.classList.remove("active"));
    tab.classList.add("active");
    document.getElementById(tab.dataset.big).classList.add("active");
  });
});

// SEARCH
const si=document.getElementById("searchInput"),sc=document.getElementById("searchCount");
si.addEventListener("input",()=>{
  const q=si.value.toLowerCase().trim();let t=0,v=0;
  document.querySelectorAll("[data-search]").forEach(el=>{t++;
    if(!q||el.dataset.search.toLowerCase().includes(q)){el.style.display="";v++}else{el.style.display="none"}
  });
  sc.textContent=q?`${v} / ${t} results`:"";
  if(q){
    document.querySelectorAll(".big-section").forEach(s=>s.classList.add("active"));
    document.querySelectorAll(".sub-section").forEach(s=>s.classList.add("active"));
    document.querySelectorAll(".big-tab").forEach(t=>t.classList.remove("active"));
  } else {
    document.querySelectorAll(".big-section").forEach(s=>s.classList.remove("active"));
    document.querySelectorAll(".sub-section").forEach(s=>s.classList.remove("active"));
    document.getElementById("iris").classList.add("active");
    document.querySelector('.big-tab[data-big="iris"]').classList.add("active");
    // Reactivate first sub-tabs
    document.querySelectorAll(".sub-tabs").forEach(st=>{const first=st.querySelector(".sub-tab");if(first){first.click()}});
  }
});
