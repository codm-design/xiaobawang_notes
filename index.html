// TTS PRONUNCIATION (Web Speech API)

function speak(text, accent) {
  if (!window.speechSynthesis) return alert("Your browser doesn't support speech synthesis.");
  window.speechSynthesis.cancel();
  const u = new SpeechSynthesisUtterance(text.replace(/\/.+?\//g,"").replace(/[^a-zA-Z\s'-]/g,"").trim());
  u.rate = 0.85; u.pitch = 1;
  const voices = window.speechSynthesis.getVoices();
  const lang = accent === "uk" ? "en-GB" : "en-US";
  const voice = voices.find(v => v.lang === lang) || voices.find(v => v.lang.startsWith("en"));
  if (voice) u.voice = voice;
  u.lang = lang;
  window.speechSynthesis.speak(u);
}
// Preload voices
if (window.speechSynthesis) {
  speechSynthesis.getVoices();
  speechSynthesis.onvoiceschanged = () => speechSynthesis.getVoices();
}

    {r:"B",t:"I would like a coke.",zh:"我想要一杯可乐。"},
    {r:"A",t:"What size?",zh:"要什么尺寸？"},
    {r:"B",t:"Large, please.",zh:"大杯，谢谢。"},
    {r:"A",t:"What else do you want?",zh:"还要别的吗？"},
    {r:"B",t:"Can I also get a fries?",zh:"再来份薯条。"},
    {r:"A",t:"We have combo 3 that contains all of them. It will be cheaper.",zh:"我们有3号套餐包含这些，更便宜。"},
    {r:"B",t:"Yes, of course.",zh:"好的，没问题。"},
    {r:"A",t:"For here or to go?",zh:"在这吃还是带走？"},
    {r:"B",t:"For here, please.",zh:"在这吃。"},
    {r:"A",t:"It will be 12 dollars in total.",zh:"一共12美元。"},
    {r:"B",t:"By credit card.",zh:"刷信用卡。"},
    {r:"A",t:"Here you go!",zh:"给您！"},
    {r:"B",t:"Thanks!",zh:"谢谢！"},
    {r:"A",t:"Have a nice day!",zh:"祝您愉快！"}
  ]},
  {title:"场景2: 谈天气 & 约咖啡",cat:"天气/社交",date:"2026-04-14",lines:[
    {r:"A",t:"Good morning! It's a nice day, isn't it?",zh:"早上好！天气不错，是吧？"},
    {r:"B",t:"Yes, it is. I feel so good about today's weather. It's sunny and warm.",zh:"是的，今天天气真好，又晴又暖。"},
    {r:"A",t:"Yeah, it was a little bit cold yesterday. What are you going to do later?",zh:"昨天有点冷。你待会打算做什么？"},
    {r:"B",t:"Nothing.",zh:"没什么安排。"},
    {r:"A",t:"How about having a coffee together?",zh:"一起喝杯咖啡怎么样？"},
    {r:"B",t:"Good idea!",zh:"好主意！"},
    {r:"A",t:"Let's go, coffee is on me.",zh:"走吧，我请客。"},
    {r:"B",t:"Thanks then!",zh:"那谢啦！"},
    {r:"A",t:"What coffee do you want?",zh:"你要什么咖啡？"},
    {r:"B",t:"I'd like a hot latte, small size.",zh:"我要一杯小杯热拿铁。"}
  ]},
  {title:"场景3: 谈天气（要下雨）",cat:"天气/社交",date:"2026-04-14",lines:[
    {r:"A",t:"Hi! How are you!",zh:"嗨！你好吗！"},
    {r:"B",t:"I'm good, thanks. What do you think about the weather today? It's looking pretty cloudy.",zh:"我很好。你觉得今天天气怎么样？看着挺多云的。"},
    {r:"A",t:"Yeah, looks like it is going to rain later.",zh:"是啊，看起来待会要下雨。"},
    {r:"B",t:"Do you think it will be a heavy rain?",zh:"你觉得会是大雨吗？"},
    {r:"A",t:"I'm not sure. But I think it's going to clear up soon.",zh:"不确定。但我觉得很快会放晴。"}
  ]},
  {title:"游戏对话1: PC vs 手机游戏",cat:"游戏",date:"2026-04-14",lines:[
    {r:"C",t:"Do you prefer PC games or mobile games?",zh:"你更喜欢电脑游戏还是手机游戏？"},
    {r:"D",t:"I think I like PC games more. The screen is bigger.",zh:"我更喜欢电脑游戏，屏幕更大。"},
    {r:"C",t:"True. But mobile games are so easy to play anywhere.",zh:"没错。但手机游戏在哪都能玩。"},
    {r:"D",t:"Yeah, like on the bus or during a break.",zh:"是啊，比如在公交车上或休息时。"},
    {r:"C",t:"What PC games do you play?",zh:"你玩什么电脑游戏？"},
    {r:"D",t:"I play Minecraft with my friends. We build things together.",zh:"我和朋友玩《我的世界》，一起建东西。"},
    {r:"C",t:"What mobile games do you play?",zh:"你玩什么手机游戏？"},
    {r:"D",t:"Mostly puzzle games, like Candy Crush. It helps me kill time.",zh:"主要是解谜游戏，帮我打发时间。"}
  ]},
  {title:"游戏对话2: 游戏类型偏好",cat:"游戏",date:"2026-04-14",lines:[
    {r:"A",t:"What kind of games do you like?",zh:"你喜欢什么类型的游戏？"},
    {r:"B",t:"I love action games. I like fighting and moving fast.",zh:"我爱动作游戏，喜欢战斗和快速移动。"},
    {r:"A",t:"Cool. Like Devil May Cry or something?",zh:"酷，像《鬼泣》那样？"},
    {r:"B",t:"Yeah, exactly! I also like racing games a lot.",zh:"对！我也很喜欢赛车游戏。"},
    {r:"A",t:"I'm more into strategy games, though.",zh:"不过我更喜欢策略游戏。"},
    {r:"B",t:"Strategy games? Like chess?",zh:"策略游戏？像国际象棋？"},
    {r:"A",t:"Kind of. Like Civilization or StarCraft. You need to think a lot.",zh:"差不多，像《文明》或《星际争霸》，需要想很多。"},
    {r:"B",t:"That sounds hard. My brain would hurt!",zh:"听起来很难，我脑子会疼的！"},
    {r:"A",t:"Haha, you get used to it. It's satisfying when your plan works.",zh:"哈哈习惯就好，计划成功时很有成就感。"}
  ]},
  {title:"游戏对话3: 游戏设计师采访",cat:"游戏",date:"2026-04-14",lines:[
    {r:"Alex",t:"Hi Jamie! I love playing video games, and I want to make them one day.",zh:"我爱玩游戏，将来想做游戏。"},
    {r:"Jamie",t:"That's great! What kind of games do you like?",zh:"太好了！你喜欢什么类型的？"},
    {r:"Alex",t:"I really like platform games, like Super Mario.",zh:"我喜欢平台游戏，像超级马里奥。"},
    {r:"Jamie",t:"My job is to think about the rules of the game. I decide how the player moves, what the goals are, and if the game is fun.",zh:"我的工作是设计游戏规则——玩家怎么动、目标是什么、好不好玩。"},
    {r:"Alex",t:"So you don't draw the characters?",zh:"那你不画角色吗？"},
    {r:"Jamie",t:"No, that's a different job. Artists draw the characters. We also have programmers who write the code.",zh:"不，那是美术的工作。我们还有程序员写代码。"},
    {r:"Alex",t:"It sounds like a lot of teamwork.",zh:"听起来需要很多团队合作。"},
    {r:"Jamie",t:"Yes, teamwork is very important.",zh:"是的，团队合作非常重要。"}
  ]},
  {title:"电影对话1: 看恐怖片后",cat:"电影",date:"2026-04-14",lines:[
    {r:"A",t:"So, what do you think of the movie?",zh:"你觉得这部电影怎么样？"},
    {r:"B",t:"It was scary, but not too disgusting. I quite liked the atmosphere.",zh:"挺吓人的，但不恶心。我很喜欢那个氛围。"},
    {r:"A",t:"I thought the middle part was a little slow, but the last 30 minutes were super tense.",zh:"中间有点慢，但最后30分钟超紧张。"},
    {r:"B",t:"True. Some scenes made me hold my breath the whole time.",zh:"是的，有些场景让我一直屏住呼吸。"},
    {r:"A",t:"Did you jump at that sudden sound effect? I almost screamed.",zh:"你被那个突然的音效吓到了吗？我差点尖叫。"},
    {r:"B",t:"Of course I did! I hate jump scares, but they were used really well here.",zh:"当然了！我讨厌jump scare，但这里用得真好。"},
    {r:"A",t:"By the way, are you free next Saturday? There's a comedy coming out.",zh:"对了，下周六有空吗？有个喜剧要上映。"},
    {r:"B",t:"Sounds perfect. I need something light and funny after this.",zh:"太好了，看完这个我需要点轻松搞笑的。"},
    {r:"A",t:"Let's buy tickets in advance. The cinema is usually crowded on weekends.",zh:"我们提前买票吧，周末影院通常很挤。"}
  ]},
  {title:"电影对话2: 看完好电影",cat:"电影",date:"2026-04-14",lines:[
    {r:"A",t:"Wow, that movie was way better than I expected.",zh:"哇，这电影比我预期好太多了。"},
    {r:"B",t:"Right? I thought it was just another action movie, but the story was actually really deep.",zh:"对吧？我以为又是个普通动作片，但故事真的很深刻。"},
    {r:"A",t:"The plot twists totally caught me off guard. I didn't see that ending coming at all.",zh:"剧情反转完全出乎意料，我完全没猜到结局。"},
    {r:"B",t:"Me neither. And the main actor's performance was amazing. I almost teared up.",zh:"我也没有。主角的表演太棒了，我差点哭了。"},
    {r:"A",t:"Same here. The cinematography was stunning too.",zh:"我也是。摄影也太美了。"},
    {r:"B",t:"By the way, did you finish your popcorn? I ate mine in the first 30 minutes.",zh:"对了，你爆米花吃完了吗？我前30分钟就吃完了。"},
    {r:"A",t:"Yeah, I was so focused on the movie I didn't even realize.",zh:"吃完了，我太专注电影都没意识到。"},
    {r:"B",t:"Wanna grab some milk tea before we go home? My treat.",zh:"回家前喝杯奶茶？我请。"},
    {r:"A",t:"Sure! And we should watch the sequel together when it comes out.",zh:"好！续集出来我们一起看。"},
    {r:"B",t:"Definitely. I'm already looking forward to it.",zh:"必须的，我已经期待了。"}
  ]}
];

// BUILD UI DYNAMICALLY

function examH(arr){
  if(!arr||!arr.length) return "";
  const c={"高考":"gaokao","四级":"cet4","六级":"cet6","考研":"kaoyan","雅思":"ielts","托福":"toefl"};
  return `<div class="exam-tags">${arr.map(e=>`<span class="exam-tag ${c[e]||''}">${e}</span>`).join("")}</div>`;
}
function formsH(w){
  const p=[];
  if(w.past)p.push(`<span class="form-item past"><span class="fl">Past</span>${w.past}</span>`);
  if(w.pp&&w.pp!==w.past)p.push(`<span class="form-item pp"><span class="fl">P.P.</span>${w.pp}</span>`);
  if(w.ing)p.push(`<span class="form-item ing"><span class="fl">-ing</span>${w.ing}</span>`);
  if(w.future)p.push(`<span class="form-item future"><span class="fl">Will</span>${w.future}</span>`);
  if(w.plural)p.push(`<span class="form-item plural"><span class="fl">Pl.</span>${w.plural}</span>`);
  return p.length?`<div class="forms">${p.join("")}</div>`:"";
}
function tagH(t){
  const m={verb:"动词",adj:"形容词",adv:"副词",prep:"介词",phrase:"短语"};
  const bg={verb:"#D1FAE5",adj:"#FEF3C7",adv:"#FCE7F3",prep:"#E0E7FF",phrase:"#EDE9FE"};
  const fg={verb:"#065F46",adj:"#92400E",adv:"#9D174D",prep:"#3730A3",phrase:"#5B21B6"};
  return t?`<span style="display:inline-block;font-size:.65rem;padding:1px 6px;border-radius:4px;font-weight:700;background:${bg[t]||'#F3F4F6'};color:${fg[t]||'#4B5563'};margin-right:3px">${m[t]||t}</span>`:"";
}
function dictUrl(w){return `https://dict.eudic.net/dicts/en/${encodeURIComponent(w.split("/")[0].trim())}`}

function vocabCard(w){
  const word = w.en.split("/")[0].trim();
  const ph = (w.uk||w.us) ? `<div class="pron-row">
    ${w.uk?`<button class="pron-btn uk" onclick="speak('${word}','uk')"><span class="speaker">🔊</span>UK</button><span class="phonetic-text">${w.uk}</span>`:``}
    ${w.us?`<button class="pron-btn us" onclick="speak('${word}','us')"><span class="speaker">🔊</span>US</button><span class="phonetic-text">${w.us}</span>`:``}
  </div>` : "";
  const df = w.defs?`<div class="defs">${w.defs.map(d=>`<div class="def-line">${d}</div>`).join("")}</div>`:"";
  const dt = w.date?`<div style="font-size:.62rem;color:#C4B5FD;margin-top:6px">📅 ${w.date}</div>`:"";
  const ss = `${w.en} ${w.zh} ${(w.defs||[]).join(" ")} ${(w.exam||[]).join(" ")} ${w.uk||""} ${w.us||""} ${w.past||""} ${w.plural||""} ${w.date||""}`;
  return `<div class="vocab-card" data-search="${ss.replace(/"/g,"'")}" data-sub="${w.sub||w.cat}">
    <div class="card-top"><div class="en">${w.en}</div><a class="dict-link" href="${dictUrl(w.en)}" target="_blank">🔍 词典</a></div>
    ${ph}${df}${tagH(w.tag)}${examH(w.exam)}${w.note?`<div class="note">${w.note}</div>`:""}${formsH(w)}${dt}
  </div>`;
}

// ========== IRIS 英语笔记 ==========
function buildIris(){
  const cats = [...new Set(ALL_VOCAB.map(v=>v.cat))];
  const tabsEl = document.getElementById("irisSubTabs");
  const contentEl = document.getElementById("irisContent");

  // Add dialogue, exercises, phrase, grammar & source tabs
  const allTabs = [...cats, "场景对话", "被动语态练习", "语法笔记", "常用短语", "扫描来源"];
  tabsEl.innerHTML = allTabs.map((c,i) => {
    let cnt = 0;
    if(c==="场景对话") cnt=DIALOGUES.length;
    else if(c==="被动语态练习") cnt=EXERCISES.length;
    else if(c==="常用短语") cnt=PHRASES.length;
    else if(c==="扫描来源") cnt=SOURCES.length;
    else if(c==="语法笔记") cnt=GRAMMAR.length;
    else cnt=ALL_VOCAB.filter(v=>v.cat===c).length;
    return `<div class="sub-tab ${i===0?'active':''}" data-subtab="iris-${i}">${c} <span class="badge">${cnt}</span></div>`;
  }).join("");

  let html = "";
  cats.forEach((c,i) => {
    const words = ALL_VOCAB.filter(v=>v.cat===c);
    html += `<div class="sub-section ${i===0?'active':''}" id="iris-${i}">
      <div class="section-header"><h2>${c}</h2></div>
      <div class="vocab-grid">${words.map(vocabCard).join("")}</div>
    </div>`;
  });

  // Dialogues section
  const dlgIdx = cats.length;
  html += `<div class="sub-section" id="iris-${dlgIdx}">
    <div class="section-header"><h2>场景对话</h2></div>
    ${DIALOGUES.map(d => `
      <div class="grammar-card" data-search="${d.title} ${d.cat} ${d.lines.map(l=>l.t+' '+l.zh).join(' ')}">
        <h3>${d.title} <span style="font-size:.7rem;font-weight:400;color:var(--gray-light);margin-left:8px">${d.cat} | 📅 ${d.date}</span></h3>
        <div style="margin-top:8px">
          ${d.lines.map(l => `<div style="padding:6px 0;border-bottom:1px solid #F3F4F6;font-size:.88rem;display:flex;gap:8px">
            <span style="font-weight:700;color:var(--purple);min-width:40px">${l.r}:</span>
            <span><span style="color:var(--dark)">${l.t}</span><br><span style="color:var(--gray-light);font-size:.78rem">${l.zh}</span></span>
          </div>`).join("")}
        </div>
      </div>
    `).join("")}
  </div>`;

  // Exercises section
  const exIdx = dlgIdx + 1;
  html += `<div class="sub-section" id="iris-${exIdx}">
    <div class="section-header"><h2>被动语态练习</h2></div>
    <div style="margin-bottom:12px;font-size:.85rem;color:var(--gray)">📝 中文→英文翻译练习 | 来源: Iris 课程 4.14</div>
    ${EXERCISES.map((e,i) => `
      <div class="grammar-card" data-search="${e.zh} ${e.en} ${e.key}" style="cursor:pointer" onclick="this.querySelector('.ans').style.display=this.querySelector('.ans').style.display==='none'?'block':'none'">
        <div style="font-size:.9rem;font-weight:600;color:var(--dark)">${i+1}. ${e.zh}</div>
        <div style="margin-top:4px;font-size:.75rem;color:var(--gray-light)">关键词: <strong>${e.key}</strong> | 点击显示答案 👇</div>
        <div class="ans" style="display:none;margin-top:10px;padding:10px 14px;background:#ECFDF5;border-radius:8px;border-left:3px solid var(--green);color:var(--green);font-size:.9rem">
          ✓ ${e.en}
        </div>
      </div>
    `).join("")}
  </div>`;

  // Grammar section inside Iris
  const gramIdx = exIdx + 1;
  const gramCats = [...new Set(GRAMMAR.map(g=>g.cat))];
  html += `<div class="sub-section" id="iris-${gramIdx}">
    <div class="section-header"><h2>语法笔记</h2></div>
    ${gramCats.map(gc => {
      const items = GRAMMAR.filter(g=>g.cat===gc);
      return `<h3 style="font-size:1rem;font-weight:700;color:var(--purple);margin:20px 0 10px">${gc}</h3>
      ${items.map(g=>`<div class="grammar-card" data-search="${g.title} ${g.rule} ${g.ok||''} ${g.no||''}">
        <h3>${g.title}</h3><div class="rule">${g.rule}</div>
        ${g.no?`<div class="ex no"><span class="m">✗</span>${g.no}</div>`:''}
        ${g.ok?`<div class="ex ok"><span class="m">✓</span>${g.ok}</div>`:''}
      </div>`).join("")}`;
    }).join("")}
  </div>`;

  // Phrases section
  html += `<div class="sub-section" id="iris-${gramIdx+1}">
    <div class="section-header"><h2>常用短语 & 表达</h2></div>
    <table class="phrase-table"><thead><tr><th>Phrase</th><th>中文含义</th><th>Example</th><th>分类</th></tr></thead>
    <tbody>${PHRASES.map(p=>`<tr data-search="${p.p} ${p.zh} ${p.ex}"><td>${p.p}</td><td>${p.zh}</td><td>${p.ex}</td><td>${p.cat}</td></tr>`).join("")}</tbody></table>
  </div>`;

  // Source section
  html += `<div class="sub-section" id="iris-${gramIdx+2}">
    <div class="section-header"><h2>扫描件来源</h2></div>
    <div class="source-grid">${SOURCES.map(s=>`<div class="source-card"><div class="fi ${s.ink}">📄</div><div><div class="fn">${s.name}</div><div class="fd">${s.desc}</div><span class="ink ${s.ink}">${s.l}</span></div></div>`).join("")}</div>
  </div>`;

  contentEl.innerHTML = html;
  bindSubTabs(tabsEl, "iris");
}

// ========== TAB BINDING ==========
function bindSubTabs(container, prefix){
  container.querySelectorAll(".sub-tab").forEach(tab => {
    tab.addEventListener("click", () => {
      container.querySelectorAll(".sub-tab").forEach(t=>t.classList.remove("active"));
      const parent = container.nextElementSibling;
      parent.querySelectorAll(".sub-section").forEach(s=>s.classList.remove("active"));
      tab.classList.add("active");
      document.getElementById(tab.dataset.subtab).classList.add("active");
    });
  });
}

// BIG TABS
document.querySelectorAll(".big-tab").forEach(tab => {
  tab.addEventListener("click", () => {
    document.querySelectorAll(".big-tab").forEach(t=>t.classList.remove("active"));
    document.querySelectorAll(".big-section").forEach(s=>s.classList.remove("active"));
    tab.classList.add("active");
    document.getElementById(tab.dataset.big).classList.add("active");
  });
});

// SEARCH
const si=document.getElementById("searchInput"),sc=document.getElementById("searchCount");
si.addEventListener("input",()=>{
  const q=si.value.toLowerCase().trim();let t=0,v=0;
  document.querySelectorAll("[data-search]").forEach(el=>{t++;
    if(!q||el.dataset.search.toLowerCase().includes(q)){el.style.display="";v++}else{el.style.display="none"}
  });
  sc.textContent=q?`${v} / ${t} results`:"";
  if(q){
    document.querySelectorAll(".big-section").forEach(s=>s.classList.add("active"));
    document.querySelectorAll(".sub-section").forEach(s=>s.classList.add("active"));
    document.querySelectorAll(".big-tab").forEach(t=>t.classList.remove("active"));
  } else {
    document.querySelectorAll(".big-section").forEach(s=>s.classList.remove("active"));
    document.querySelectorAll(".sub-section").forEach(s=>s.classList.remove("active"));
    document.getElementById("iris").classList.add("active");
    document.querySelector('.big-tab[data-big="iris"]').classList.add("active");
    // Reactivate first sub-tabs
    document.querySelectorAll(".sub-tabs").forEach(st=>{const first=st.querySelector(".sub-tab");if(first){first.click()}});
  }
});
